name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install NSIS + EnVar plugin
        run: |
          sudo apt-get update && sudo apt-get install -y nsis
          curl -fsSL -o /tmp/EnVar.zip https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip
          sudo unzip -o /tmp/EnVar.zip -d /usr/share/nsis

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GoReleaser OSS can't build a Windows installer; build it from the dist/
      # binaries with NSIS and attach it to the release GoReleaser just created.
      - name: Build Windows installer (NSIS)
        run: bash packaging/windows/build-nsis.sh "${GITHUB_REF_NAME#v}"

      - name: Upload Windows installer
        run: gh release upload "${GITHUB_REF_NAME}" dist/*-setup.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Rebuild and publish the signed apt/dnf/pacman repos for this tag. Done here
  # (not via pages.yml's release trigger) because releases created by
  # GITHUB_TOKEN do not fire the `release` event.
  pages:
    needs: goreleaser
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
