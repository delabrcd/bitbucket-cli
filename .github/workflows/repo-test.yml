name: repo-test

# Validates that the apt/dnf/pacman repositories built by build-repos.sh are
# installable, by building them with an ephemeral key and installing bb inside
# Debian/Fedora/Arch containers. Runs when the packaging changes.
on:
  pull_request:
    paths:
      - "packaging/linux/**"
      - ".github/workflows/repo-test.yml"
  push:
    branches: [main]
    paths:
      - "packaging/linux/**"
      - ".github/workflows/repo-test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install repo-build tooling
        run: sudo apt-get update && sudo apt-get install -y apt-utils createrepo-c rpm gnupg zstd

      - name: Build repos and install bb in containers
        run: bash packaging/linux/test-repos.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
