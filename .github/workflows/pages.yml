name: Build and Deploy Linux Package Repositories

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.19.1)"
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: resolve-tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils createrepo-c rpm gnupg zstd

      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Download release packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "$TAG" \
            -R delabrcd/bitbucket-cli \
            -p '*.deb' \
            -p '*.rpm' \
            -p '*.pkg.tar.zst' \
            -D dist

      - name: Build package repositories
        env:
          DIST_DIR: dist
          OUT: public
          BASE_URL: https://delabrcd.github.io/bitbucket-cli
          GPG_FINGERPRINT: 4AEA6A46957261ECE8F77071AE688AB6D9A1A1CA
        run: bash packaging/linux/build-repos.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
