# GoReleaser configuration for the delabrcd/bitbucket-cli fork.
# Builds the `bb` binary and publishes deb/rpm/Arch packages, Windows zip + MSI,
# and archives to GitHub Releases. Run a local dry run with:
#   goreleaser release --snapshot --clean --skip=publish
version: 2

project_name: bitbucket-cli

before:
  hooks:
    - go mod tidy
    - sh -c 'set -e; tmp=$(mktemp -d); go build -o "$tmp/bb" .; mkdir -p completions; "$tmp/bb" completion bash > completions/bb; "$tmp/bb" completion zsh > completions/_bb; "$tmp/bb" completion fish > completions/bb.fish; rm -rf "$tmp"'

builds:
  - id: bb
    main: .
    binary: bb
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    # Version is tag-based: GoReleaser injects the tag here; version.go has no
    # hardcoded version and falls back to build info / "dev" when unset.
    ldflags:
      - -s -w
      - -X main.VERSION={{ .Version }}

archives:
  - id: bb
    ids:
      - bb
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

nfpms:
  - id: packages
    package_name: bitbucket-cli
    ids:
      - bb
    vendor: delabrcd
    homepage: https://github.com/delabrcd/bitbucket-cli
    maintainer: delabrcd <delabrcd@users.noreply.github.com>
    description: |-
      The Bitbucket Command Line Interface brings the power of the Bitbucket
      platform to your command line: pull requests, pipelines, runners,
      repositories, and more.
    license: MIT
    formats:
      - deb
      - rpm
      - archlinux
    bindir: /usr/bin
    section: utils
    # Runtime dependencies. bb shells out to `git` (pr create --fill, repository
    # clone) and to `xdg-open` (OAuth browser flow, profile authorize); both are
    # named identically on Debian/Fedora/Arch. gnome-keyring provides the D-Bus
    # Secret Service that backs the credential vault (token/password storage);
    # it is only Recommended because bb falls back to plaintext config when no
    # secret service is available, and headless hosts often lack one. Arch has
    # no weak-dependency concept, so recommends is a no-op there.
    dependencies:
      - git
      - xdg-utils
    recommends:
      - gnome-keyring
    # Shell completions generated in the before-hook above (completions/bb,
    # completions/_bb, completions/bb.fish); ship them so the package manager
    # installs them into the standard system completion directories.
    contents:
      - src: ./completions/bb
        dst: /usr/share/bash-completion/completions/bb
        file_info:
          mode: 0644
      - src: ./completions/_bb
        dst: /usr/share/zsh/site-functions/_bb
        file_info:
          mode: 0644
      - src: ./completions/bb.fish
        dst: /usr/share/fish/vendor_completions.d/bb.fish
        file_info:
          mode: 0644

# Windows ships as a portable zip here (see archives). The MSI installer is a
# GoReleaser Pro feature, so it is built from the dist/ binaries by wixl
# (msitools) and uploaded in the release workflow (.github/workflows/release.yml).

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: delabrcd
    name: bitbucket-cli
  draft: false
  prerelease: auto
