# Task runner for development. Install: https://taskfile.dev
#   go install github.com/go-task/task/v3/cmd/task@latest
# Releases are produced by GoReleaser (.goreleaser.yaml) on git tags; CI runs in
# .github/workflows/ci.yml. This file is just developer convenience.
version: "3"

vars:
  BINARY: bb
  # Version is derived from the git tag at build time (never hardcoded).
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  GOPATH:
    sh: go env GOPATH

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the bb binary into the working directory
    cmds:
      - go build -ldflags "-s -w -X main.VERSION={{.VERSION}}" -o {{.BINARY}} .

  install:
    desc: Build and install bb into $GOPATH/bin
    cmds:
      - go build -ldflags "-s -w -X main.VERSION={{.VERSION}}" -o "{{.GOPATH}}/bin/{{.BINARY}}" .

  local:
    desc: Build the dev binary and expose it as `bb-local` on your PATH (~/.local/bin); the released `bb` stays untouched
    cmds:
      - task: build
      - mkdir -p "$HOME/.local/bin"
      - ln -sf "{{.TASKFILE_DIR}}/{{.BINARY}}" "$HOME/.local/bin/bb-local"
      - 'echo "bb-local -> {{.TASKFILE_DIR}}/{{.BINARY}} ({{.VERSION}})  |  run ''bb-local'' for this dev build, ''bb'' for the release"'

  local:remove:
    desc: Remove the `bb-local` symlink from ~/.local/bin
    cmds:
      - rm -f "$HOME/.local/bin/bb-local"
      - 'echo "removed $HOME/.local/bin/bb-local"'

  test:
    desc: Run the test suite
    cmds:
      - go test ./...

  fmt:
    desc: Format the code with gofmt
    cmds:
      - gofmt -w .

  lint:
    desc: Run go vet and check formatting
    cmds:
      - go vet ./...
      - test -z "$(gofmt -l .)"

  tidy:
    desc: Tidy go.mod / go.sum
    cmds:
      - go mod tidy

  snapshot:
    desc: Build a local snapshot release with GoReleaser (no publish)
    cmds:
      - goreleaser release --snapshot --clean --skip=publish

  completions:
    desc: Generate shell completion scripts into completions/ for local inspection
    cmds:
      - sh -c 'set -e; tmp=$(mktemp -d); go build -o "$tmp/bb" .; mkdir -p completions; "$tmp/bb" completion bash > completions/bb; "$tmp/bb" completion zsh > completions/_bb; "$tmp/bb" completion fish > completions/bb.fish; rm -rf "$tmp"'

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist {{.BINARY}} completions
